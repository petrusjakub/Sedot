<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Video Downloader - Premium</title>
    <style>
        :root {
            --emerald: #50C878;
            --tosca: #008080;
            --ruby: #E0115F;
            --dark-bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border-glow: rgba(80, 200, 120, 0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body {
            background: linear-gradient(135deg, var(--dark-bg) 0%, #1a2f2f 50%, #0f172a 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glow);
            padding: 2rem;
            border-radius: 20px;
            width: 100%;
            max-width: 560px;
            box-shadow: 0 10px 30px rgba(0, 128, 128, 0.2);
        }
        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .logo h1 {
            font-size: 1.8rem;
            background: linear-gradient(90deg, var(--emerald), var(--tosca));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
        }
        .logo p { color: #94a3b8; font-size: 0.9rem; margin-top: 5px; }

        .input-group { margin-bottom: 1.2rem; }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(80, 200, 120, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--emerald);
            box-shadow: 0 0 15px rgba(80, 200, 120, 0.3);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 1.2rem;
        }
        .option-group {
            display: flex;
            flex-direction: column;
        }
        .option-group label {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 5px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        select {
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(80, 200, 120, 0.3);
            border-radius: 10px;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 16px;
            padding-right: 35px;
        }
        select:focus {
            outline: none;
            border-color: var(--emerald);
            box-shadow: 0 0 10px rgba(80, 200, 120, 0.2);
        }
        select option {
            background: #1e293b;
            color: white;
        }

        .toggle-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.2rem;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            border: 1px solid rgba(80, 200, 120, 0.15);
        }
        .toggle-group span {
            font-size: 0.9rem;
            color: #cbd5e1;
        }
        .toggle {
            position: relative;
            width: 48px;
            height: 26px;
            cursor: pointer;
        }
        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .toggle-slider {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(100, 116, 139, 0.5);
            border-radius: 26px;
            transition: 0.3s;
        }
        .toggle-slider:before {
            content: "";
            position: absolute;
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }
        .toggle input:checked + .toggle-slider {
            background: linear-gradient(90deg, var(--tosca), var(--emerald));
        }
        .toggle input:checked + .toggle-slider:before {
            transform: translateX(22px);
        }

        .btn-download {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, var(--tosca), var(--emerald));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-download:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(80, 200, 120, 0.4); }
        .btn-download:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .status {
            margin-top: 1.2rem;
            text-align: center;
            min-height: 24px;
            font-weight: 500;
        }
        .error { color: var(--ruby); }
        .success { color: var(--emerald); }

        .results {
            margin-top: 1.2rem;
        }
        .results-title {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 10px;
            text-align: center;
            font-weight: 600;
        }
        .result-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(80, 200, 120, 0.15);
            border-radius: 12px;
            margin-bottom: 10px;
            transition: border-color 0.3s;
        }
        .result-item:hover {
            border-color: rgba(80, 200, 120, 0.4);
        }
        .result-thumb {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            background: rgba(0, 0, 0, 0.3);
            flex-shrink: 0;
        }
        .result-info {
            flex: 1;
            min-width: 0;
        }
        .result-info .type-badge {
            display: inline-block;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(80, 200, 120, 0.2);
            color: var(--emerald);
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .result-info p {
            font-size: 0.85rem;
            color: #94a3b8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .result-download-btn {
            padding: 8px 16px;
            background: var(--ruby);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.85rem;
            transition: background 0.2s, transform 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .result-download-btn:hover { background: #c00f4f; transform: translateY(-1px); }

        .single-download {
            display: block;
            text-align: center;
            margin-top: 10px;
            padding: 12px 20px;
            background: var(--ruby);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1rem;
            transition: background 0.2s, transform 0.2s;
        }
        .single-download:hover { background: #c00f4f; transform: translateY(-1px); }

        .platforms {
            margin-top: 1.5rem;
            text-align: center;
        }
        .platforms-title {
            font-size: 0.75rem;
            color: #64748b;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .platform-icons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }
        .platform-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(80, 200, 120, 0.1);
            border-radius: 20px;
            font-size: 0.75rem;
            color: #94a3b8;
            transition: border-color 0.3s;
        }
        .platform-badge:hover {
            border-color: rgba(80, 200, 120, 0.4);
            color: #e2e8f0;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: var(--emerald);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden { display: none; }

        @media (max-width: 480px) {
            .container { padding: 1.5rem; }
            .logo h1 { font-size: 1.5rem; }
            .options-grid { grid-template-columns: 1fr; }
            .result-item { flex-direction: column; text-align: center; }
            .result-thumb { width: 80px; height: 80px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>&#9889; MAGIC DOWNLOADER</h1>
            <p>HD Quality &bull; Tanpa Watermark &bull; Multi-Platform</p>
        </div>

        <div class="input-group">
            <input type="text" id="videoUrl" placeholder="Tempel link video/foto di sini (TikTok, IG, YT, dll)...">
        </div>

        <div class="options-grid">
            <div class="option-group">
                <label>Format Download</label>
                <select id="downloadFormat">
                    <option value="auto">Video</option>
                    <option value="audio">MP3 / Audio</option>
                    <option value="mute">Video Tanpa Suara</option>
                </select>
            </div>
            <div class="option-group">
                <label>Kualitas Video</label>
                <select id="videoQuality">
                    <option value="max">Tertinggi</option>
                    <option value="1080">1080p</option>
                    <option value="720">720p</option>
                    <option value="480">480p</option>
                    <option value="360">360p</option>
                </select>
            </div>
        </div>

        <div class="toggle-group">
            <span>&#10003; Tanpa Watermark</span>
            <label class="toggle">
                <input type="checkbox" id="noWatermark" checked>
                <span class="toggle-slider"></span>
            </label>
        </div>

        <button class="btn-download" id="downloadBtn" onclick="processDownload()">
            Download Sekarang
        </button>

        <div id="status" class="status"></div>

        <div id="results" class="results hidden"></div>

        <div class="platforms">
            <div class="platforms-title">Platform yang Didukung</div>
            <div class="platform-icons">
                <span class="platform-badge">&#127916; TikTok</span>
                <span class="platform-badge">&#128247; Instagram</span>
                <span class="platform-badge">&#128266; Facebook</span>
                <span class="platform-badge">&#9654; YouTube</span>
                <span class="platform-badge">&#128204; Pinterest</span>
                <span class="platform-badge">&#128172; Threads</span>
                <span class="platform-badge">&#128722; Shopee</span>
            </div>
        </div>
    </div>

    <script>
        const WORKER_URL = 'https://video-proxy-api.petrusjakub.workers.dev/';

        function detectPlatform(url) {
            const platforms = [
                { name: 'TikTok', pattern: /tiktok\.com/i },
                { name: 'Instagram', pattern: /instagram\.com/i },
                { name: 'Facebook', pattern: /(facebook\.com|fb\.watch)/i },
                { name: 'YouTube', pattern: /(youtube\.com|youtu\.be)/i },
                { name: 'Pinterest', pattern: /(pinterest\.com|pin\.it)/i },
                { name: 'Threads', pattern: /threads\.net/i },
                { name: 'Shopee', pattern: /(shopee\.co\.id|shopee\.com)/i }
            ];
            for (const p of platforms) {
                if (p.pattern.test(url)) return p.name;
            }
            return null;
        }

        function buildRequestBody(url) {
            const downloadMode = document.getElementById('downloadFormat').value;
            const videoQuality = document.getElementById('videoQuality').value;

            return {
                url: url,
                downloadMode: downloadMode,
                videoQuality: videoQuality,
                filenameStyle: 'basic',
                tiktokFullAudio: true,
                tiktokH265: false,
                disableMetadata: false
            };
        }

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.className = 'status ' + (type || '');
            status.innerHTML = message;
        }

        function clearResults() {
            const results = document.getElementById('results');
            results.innerHTML = '';
            results.classList.add('hidden');
        }

        function showSingleDownload(url, label) {
            const results = document.getElementById('results');
            results.classList.remove('hidden');
            results.innerHTML = `
                <a href="${url}" target="_blank" rel="noopener noreferrer" class="single-download">
                    &#128190; ${label || 'Klik untuk Download'}
                </a>
            `;
        }

        function showPickerResults(pickerItems) {
            const results = document.getElementById('results');
            results.classList.remove('hidden');

            let html = '<div class="results-title">Ditemukan ' + pickerItems.length + ' file</div>';

            pickerItems.forEach(function(item, index) {
                const typeLabel = item.type === 'photo' ? 'Foto' : 'Video';
                const thumbHtml = item.thumb
                    ? '<img src="' + item.thumb + '" alt="Thumbnail" class="result-thumb">'
                    : '<div class="result-thumb" style="display:flex;align-items:center;justify-content:center;font-size:1.5rem;">' + (item.type === 'photo' ? '&#128247;' : '&#127916;') + '</div>';

                html += `
                    <div class="result-item">
                        ${thumbHtml}
                        <div class="result-info">
                            <span class="type-badge">${typeLabel}</span>
                            <p>File ${index + 1} - ${typeLabel}</p>
                        </div>
                        <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="result-download-btn">
                            &#128190; Unduh
                        </a>
                    </div>
                `;
            });

            results.innerHTML = html;
        }

        function getErrorMessage(errorCode) {
            const errorMessages = {
                'error.api.link.invalid': 'Link tidak valid. Pastikan URL yang dimasukkan benar.',
                'error.api.fetch.fail': 'Gagal mengambil konten. Coba lagi nanti.',
                'error.api.fetch.rate': 'Terlalu banyak permintaan. Tunggu beberapa saat.',
                'error.api.content.video.unavailable': 'Video tidak tersedia atau sudah dihapus.',
                'error.api.content.post.unavailable': 'Postingan tidak tersedia atau bersifat privat.',
                'error.api.fetch.empty': 'Tidak ada konten yang bisa diunduh dari link ini.',
                'error.api.service.disabled': 'Layanan untuk platform ini sedang tidak tersedia.'
            };
            return errorMessages[errorCode] || 'Terjadi kesalahan: ' + (errorCode || 'tidak diketahui');
        }

        async function processDownload() {
            const url = document.getElementById('videoUrl').value.trim();
            const btn = document.getElementById('downloadBtn');

            clearResults();

            if (!url) {
                showStatus('&#9888;&#65039; Masukkan link terlebih dahulu!', 'error');
                return;
            }

            const platform = detectPlatform(url);
            if (!platform) {
                showStatus('&#9888;&#65039; Platform tidak dikenali. Pastikan link dari TikTok, Instagram, Facebook, YouTube, Pinterest, Threads, atau Shopee.', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Memproses...';
            showStatus('Mengekstrak konten dari ' + platform + ', mohon tunggu...', '');

            try {
                const requestBody = buildRequestBody(url);

                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    throw new Error('Server error: ' + response.status);
                }

                const data = await response.json();

                if (data.status === 'error') {
                    const errorMsg = getErrorMessage(data.error);
                    showStatus('&#10060; ' + errorMsg, 'error');
                    return;
                }

                if (data.status === 'redirect' || data.status === 'tunnel') {
                    if (data.url) {
                        const format = document.getElementById('downloadFormat').value;
                        let label = 'Klik untuk Download Video';
                        if (format === 'audio') label = 'Klik untuk Download Audio';
                        if (format === 'mute') label = 'Klik untuk Download Video (Tanpa Suara)';

                        showStatus('&#9989; Konten siap diunduh!', 'success');
                        showSingleDownload(data.url, label);
                    } else {
                        showStatus('&#10060; Link download tidak ditemukan.', 'error');
                    }
                    return;
                }

                if (data.status === 'picker') {
                    if (data.picker && data.picker.length > 0) {
                        showStatus('&#9989; Ditemukan ' + data.picker.length + ' file untuk diunduh!', 'success');
                        showPickerResults(data.picker);
                    } else {
                        showStatus('&#10060; Tidak ada konten yang bisa diunduh.', 'error');
                    }
                    return;
                }

                // Fallback for unexpected response
                if (data.url) {
                    showStatus('&#9989; Konten siap diunduh!', 'success');
                    showSingleDownload(data.url, 'Klik untuk Download');
                } else {
                    showStatus('&#10060; Format respons tidak dikenali.', 'error');
                }

            } catch (error) {
                showStatus('&#10060; Error: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Download Sekarang';
            }
        }

        // Allow pressing Enter to trigger download
        document.getElementById('videoUrl').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                processDownload();
            }
        });
    </script>
</body>
</html>
