<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Video Downloader - Premium</title>
    <style>
        :root {
            --emerald: #50C878;
            --tosca: #008080;
            --ruby: #E0115F;
            --dark-bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body {
            background: linear-gradient(135deg, var(--dark-bg) 0%, #1a2f2f 50%, #0f172a 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(80, 200, 120, 0.2);
            padding: 2rem;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0, 128, 128, 0.2);
        }
        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .logo h1 {
            font-size: 1.8rem;
            background: linear-gradient(90deg, var(--emerald), var(--tosca));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        .logo p { color: #94a3b8; font-size: 0.9rem; margin-top: 5px; }
        .input-group { margin-bottom: 1.5rem; }
        input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(80, 200, 120, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: var(--emerald);
            box-shadow: 0 0 15px rgba(80, 200, 120, 0.3);
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, var(--tosca), var(--emerald));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(80, 200, 120, 0.4); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .status {
            margin-top: 1.5rem;
            text-align: center;
            min-height: 24px;
            font-weight: 500;
        }
        .error { color: var(--ruby); }
        .success { color: var(--emerald); }
        .download-link {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: var(--ruby);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .download-link:hover { background: #c00f4f; }
        .platforms {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: #64748b;
            line-height: 1.6;
        }
        @media (max-width: 480px) {
            .container { padding: 1.5rem; }
            .logo h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>⚡ MAGIC DOWNLOADER</h1>
            <p>HD Quality • No Watermark • Multi-Platform</p>
        </div>
        <div class="input-group">
            <input type="text" id="videoUrl" placeholder="Paste link video di sini (TikTok, IG, YT, dll)...">
        </div>
        <button id="downloadBtn" onclick="processDownload()">Download Sekarang</button>
        <div id="status" class="status"></div>
        <div class="platforms">
            Support: TikTok • Instagram • Facebook • YouTube • Pinterest • Shopee
        </div>
    </div>

    <script>
        // GANTI URL DI BAWAH INI DENGAN URL CLOUDFLARE WORKER ANDA (Langkah 4)
        const WORKER_URL = 'https://video-proxy-api.petrusjakub.workers.dev/'; 

        async function processDownload() {
            const url = document.getElementById('videoUrl').value.trim();
            const btn = document.getElementById('downloadBtn');
            const status = document.getElementById('status');

            if (!url) {
                status.textContent = '⚠️ Masukkan link video terlebih dahulu!';
                status.className = 'status error';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Mengekstrak Video...';
            status.innerHTML = 'Mengekstrak video, mohon tunggu...';
            status.className = 'status';

            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();

                if (data.status === 'error' || data.error) {
                    throw new Error(data.text || data.error || 'Gagal mengekstrak video');
                }

                // Cobalt API returns 'url' for direct downloads or 'picker' for multiple
                let downloadUrl = data.url;
                if (data.picker && data.picker.length > 0) {
                    downloadUrl = data.picker[0].url; // Ambil video pertama jika ada banyak
                }

                if (downloadUrl) {
                    status.innerHTML = '✅ Video siap diunduh!';
                    status.className = 'status success';
                    
                    // Buat tombol download manual untuk menghindari popup blocker
                    const link = document.createElement('a');
                    link.href = downloadUrl;
                    link.target = '_blank';
                    link.className = 'download-link';
                    link.textContent = '💾 Klik untuk Simpan Video';
                    status.appendChild(link);
                } else {
                    throw new Error('Link download tidak ditemukan.');
                }
            } catch (error) {
                status.textContent = '❌ Error: ' + error.message;
                status.className = 'status error';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Download Sekarang';
            }
        }
    </script>
</body>
</html>
